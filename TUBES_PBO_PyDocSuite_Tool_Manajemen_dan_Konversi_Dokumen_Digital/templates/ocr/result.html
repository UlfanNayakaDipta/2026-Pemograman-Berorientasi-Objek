{% extends "base.html" %}

{% block content %}
<div class="mb-10 mt-4 text-center">
  <div class="mx-auto inline-flex items-center justify-center w-20 h-20 rounded-full bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-400 mb-6 shadow-inner">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
    </svg>
  </div>
  <h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-50 sm:text-5xl">Extraction Successful!</h1>
  <p class="mt-4 mx-auto max-w-2xl text-base leading-relaxed text-slate-600 dark:text-slate-400">
    Text has been successfully extracted from your image.
  </p>
</div>

<div class="max-w-3xl mx-auto space-y-8 mb-16 relative">
  <!-- Decorative gradient background element -->
  <div class="absolute -top-24 -right-24 w-48 h-48 bg-violet-400/10 rounded-full blur-3xl pointer-events-none z-0"></div>
  <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-fuchsia-500/10 rounded-full blur-3xl pointer-events-none z-0"></div>

  <div class="rounded-[2rem] border border-slate-200 dark:border-slate-800 bg-white/60 dark:bg-slate-950/60 p-8 sm:p-10 shadow-sm backdrop-blur-xl relative z-10">
    <div class="space-y-4">
      <div class="border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm transition-all hover:border-violet-300 dark:hover:border-violet-700">
        <div class="flex items-center gap-4 mb-4 flex-1 min-w-0 w-full">
          <div class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-400 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd" />
            </svg>
          </div>
          <div class="min-w-0 flex-1">
            <p class="text-xs uppercase tracking-wider text-slate-500 font-medium mb-1 truncate">Extracted from:</p>
            <p class="font-bold text-slate-900 dark:text-slate-100 truncate">{{ original_filename }}</p>
          </div>
        </div>
        
        <textarea id="ocr-result-text" readonly class="w-full h-48 sm:h-72 bg-slate-50 dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-200 p-5 font-mono text-sm rounded-xl resize-y focus:outline-none focus:border-violet-400 dark:focus:border-violet-500 transition-colors custom-scrollbar">{{ extracted_text }}</textarea>
      </div>
    </div>

    <div class="mt-10 flex flex-col sm:flex-row items-center justify-center gap-4 border-t border-slate-200 dark:border-slate-800 pt-8">
      <button id="copy-btn" class="inline-flex w-full sm:w-auto items-center justify-center rounded-xl bg-gradient-to-r from-violet-500 to-fuchsia-600 px-8 py-3.5 text-sm font-bold text-white shadow-lg shadow-violet-500/30 transition-all hover:scale-105 hover:shadow-violet-500/50">
        <svg class="mr-2 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
        </svg>
        Copy to Clipboard
      </button>
      <a href="{{ reset_url }}" class="inline-flex w-full sm:w-auto items-center justify-center rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-transparent px-8 py-3 text-sm font-bold text-slate-700 dark:text-slate-200 hover:border-slate-300 dark:hover:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
        Extract Another Image
      </a>
    </div>
  </div>
</div>

<script>
  const copyBtn = document.getElementById('copy-btn');
  const textArea = document.getElementById('ocr-result-text');

  copyBtn.addEventListener('click', () => {
    textArea.select();
    textArea.setSelectionRange(0, 99999); // For mobile devices
    
    navigator.clipboard.writeText(textArea.value).then(() => {
      const originalText = copyBtn.innerHTML;
      copyBtn.innerHTML = `
        <svg class="mr-2 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        Copied!
      `;
      setTimeout(() => {
        copyBtn.innerHTML = originalText;
      }, 2000);
    }).catch(err => {
      console.error('Failed to copy!', err);
    });
  });
</script>
{% endblock %}
