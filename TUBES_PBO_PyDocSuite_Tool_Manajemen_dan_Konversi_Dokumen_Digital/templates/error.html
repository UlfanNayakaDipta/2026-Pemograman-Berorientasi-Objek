{% extends "base.html" %}

{% block content %}
  <div class="mx-auto max-w-2xl border border-rose-300 dark:border-rose-900 bg-rose-50 dark:bg-rose-950/40 p-6 transition-colors rounded-xl">
    <p class="text-xs font-semibold uppercase tracking-[0.35em] text-rose-600 dark:text-rose-300">Error State</p>
    <h2 class="mt-3 text-2xl font-semibold text-slate-900 dark:text-slate-100">{{ title or "Something went wrong" }}</h2>
    <p class="mt-4 text-sm leading-6 text-slate-700 dark:text-slate-300">{{ message }}</p>

    <div class="mt-8">
      <a
        href="{{ back_url }}"
        class="inline-flex items-center justify-center rounded-lg border border-slate-300 dark:border-slate-700 bg-slate-200 dark:bg-slate-900 px-5 py-3 text-sm font-semibold text-slate-700 dark:text-slate-200 transition hover:border-slate-400 dark:hover:border-slate-500 hover:bg-slate-300 dark:hover:bg-slate-800"
      >
        Convert Another File
      </a>
    </div>
  </div>
{% endblock %}
